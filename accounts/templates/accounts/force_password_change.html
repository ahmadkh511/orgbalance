{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger text-center" style="border: 3px solid red; padding: 40px;">
        <h2 style="color: red;">⚠️ تنبيه أمني خطير!</h2>
        <p class="mt-3 fs-5">تم إنشاء حسابك بكلمة مرور مؤقتة. يجب عليك تغييرها فوراً للمتابعة.</p>
        
        <form method="POST" class="mt-4 mx-auto" style="max-width: 400px;">
            {% csrf_token %}
            <input type="password" name="new_password1" class="form-control form-control-lg mb-3" placeholder="كلمة المرور الجديدة" required>
            <input type="password" name="new_password2" class="form-control form-control-lg mb-3" placeholder="تأكيد كلمة المرور" required>
            
            {% if error %}
                <div class="text-danger mb-3 fw-bold">{{ error }}</div>
            {% endif %}
            
            <button type="submit" class="btn btn-danger btn-lg w-100">تحديث كلمة المرور الآن</button>
        </form>
    </div>
</div>
{% endblock %}
