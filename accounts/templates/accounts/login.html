<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول |  أسم شركتك</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --aqua-1: #e0f7fa;
            --aqua-2: #b2ebf2;
            --aqua-3: #4dd0e1;
            --aqua-4: #0097a7;
            --text-dark: #006064;
            --text-light: #ffffff;
            --shadow-sm: 0 2px 8px rgba(0, 150, 167, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 150, 167, 0.12);
            --shadow-lg: 0 8px 30px rgba(0, 150, 167, 0.18);
            --shadow-xl: 0 20px 60px rgba(0, 96, 100, 0.22);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--aqua-1);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* خلفية الصفحة */
        .auth-page-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(160deg, #e0f7fa 0%, #b2ebf2 30%, #80deea 60%, #4dd0e1 100%);
            z-index: 0; overflow: hidden;
        }
        .auth-page-bg::before {
            content: ''; position: absolute; top: -20%; right: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%);
            border-radius: 50%; animation: floatBlob1 18s ease-in-out infinite;
        }
        .auth-page-bg::after {
            content: ''; position: absolute; bottom: -15%; left: -5%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,150,167,0.12) 0%, transparent 70%);
            border-radius: 50%; animation: floatBlob2 22s ease-in-out infinite;
        }
        @keyframes floatBlob1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 30px) scale(1.1); }
            66% { transform: translate(20px, -20px) scale(0.95); }
        }
        @keyframes floatBlob2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.08); }
        }

        /* فقاعات */
        .bubble {
            position: absolute; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.2);
            animation: rise linear infinite; pointer-events: none;
        }
        .bubble:nth-child(1) { width: 20px; height: 20px; left: 10%; bottom: -20px; animation-duration: 12s; }
        .bubble:nth-child(2) { width: 35px; height: 35px; left: 25%; bottom: -35px; animation-duration: 16s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 15px; height: 15px; left: 40%; bottom: -15px; animation-duration: 10s; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 25px; height: 25px; left: 55%; bottom: -25px; animation-duration: 14s; animation-delay: 1s; }
        .bubble:nth-child(5) { width: 18px; height: 18px; left: 70%; bottom: -18px; animation-duration: 11s; animation-delay: 3s; }
        .bubble:nth-child(6) { width: 30px; height: 30px; left: 85%; bottom: -30px; animation-duration: 18s; animation-delay: 5s; }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; } 90% { opacity: 0.6; }
            100% { transform: translateY(-110vh); opacity: 0; }
        }

        /* الحاوية */
        .auth-wrapper {
            position: relative; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 2rem 1rem;
        }

        /* البطاقة */
        .auth-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%; max-width: 440px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: cardEntrance 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .auth-card:hover { box-shadow: 0 24px 70px rgba(0, 96, 100, 0.26); }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* رأس البطاقة */
        .auth-card-header {
            background: linear-gradient(135deg, var(--aqua-4) 0%, var(--text-dark) 100%);
            color: var(--text-light); padding: 2.5rem 2rem 2rem;
            text-align: center; position: relative; overflow: hidden;
        }
        .auth-card-header::before {
            content: ''; position: absolute; top: -60%; right: -30%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 60%);
            animation: headerGlow 25s linear infinite;
        }
        @keyframes headerGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .auth-icon-wrap {
            width: 72px; height: 72px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem; border: 2px solid rgba(255, 255, 255, 0.25);
            position: relative; z-index: 1; animation: iconPulse 3s ease-in-out infinite;
        }
        @keyframes iconPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255,255,255,0); }
        }
        .auth-icon-wrap i { font-size: 1.8rem; }
        .auth-card-header h2 {
            font-weight: 700; font-size: 1.5rem; margin-bottom: 0.3rem;
            position: relative; z-index: 1;
        }
        .auth-card-header p {
            margin: 0; opacity: 0.85; font-size: 0.9rem;
            position: relative; z-index: 1;
        }

        /* جسم البطاقة */
        .auth-card-body { padding: 2rem; }

        /* التنبيهات */
        .auth-alert {
            border-radius: var(--radius-md); padding: 0.85rem 1rem;
            font-size: 0.85rem; display: flex; align-items: flex-start; gap: 0.6rem;
            margin-bottom: 1.5rem; animation: alertShake 0.5s ease-in-out; border: none;
        }
        .auth-alert-danger {
            background: linear-gradient(135deg, #fff5f5 0%, #fee2e2 100%);
            color: #b91c1c; border-right: 4px solid #dc2626;
        }
        @keyframes alertShake {
            0%, 100% { transform: translateX(0); }
            15%, 45%, 75% { transform: translateX(-4px); }
            30%, 60%, 90% { transform: translateX(4px); }
        }
        .auth-alert i { margin-top: 2px; flex-shrink: 0; }
        .auth-alert .alert-close {
            margin-right: auto; cursor: pointer; opacity: 0.6;
            transition: opacity 0.2s; background: none; border: none;
            color: inherit; font-size: 1rem;
        }
        .auth-alert .alert-close:hover { opacity: 1; }

        /* الحقول */
        .auth-form-group { margin-bottom: 1.25rem; }
        .auth-label {
            display: flex; align-items: center; gap: 0.35rem;
            font-weight: 600; font-size: 0.82rem; color: var(--text-dark); margin-bottom: 0.4rem;
        }
        .auth-label i { font-size: 0.75rem; color: var(--aqua-4); }
        .auth-label .required-star { color: #dc2626; font-size: 0.7rem; }

        .auth-input-wrap { position: relative; display: flex; align-items: center; }
        .auth-input-icon {
            position: absolute; right: 14px; color: #94a3b8; font-size: 0.9rem;
            transition: color 0.3s ease; pointer-events: none; z-index: 2;
        }
        .auth-input-wrap:focus-within .auth-input-icon { color: var(--aqua-4); }

        .auth-input {
            width: 100%; border: 1.5px solid var(--aqua-2);
            border-radius: var(--radius-sm); padding: 0.65rem 2.5rem 0.65rem 0.65rem;
            font-size: 0.9rem; font-family: 'Tajawal', sans-serif;
            background: #fff; color: #334155; transition: all 0.25s ease; outline: none;
        }
        .auth-input::placeholder { color: #b0bec5; font-size: 0.85rem; }
        .auth-input:focus { border-color: var(--aqua-3); box-shadow: 0 0 0 3px rgba(77, 208, 225, 0.18); }
        .auth-input.is-valid { border-color: #22c55e; }
        .auth-input.is-invalid { border-color: #dc2626; }

        .password-visibility-btn {
            position: absolute; left: 12px; background: none; border: none;
            color: #94a3b8; cursor: pointer; padding: 4px; font-size: 0.95rem;
            transition: color 0.2s; z-index: 2;
        }
        .password-visibility-btn:hover { color: var(--aqua-4); }

        .field-error {
            color: #dc2626; font-size: 0.75rem; margin-top: 0.3rem;
            display: flex; align-items: center; gap: 0.3rem; animation: fadeInDown 0.3s ease;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* خيارات */
        .auth-options-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .auth-remember-me {
            display: flex; align-items: center; gap: 0.5rem;
            cursor: pointer; font-size: 0.85rem; color: #475569;
        }
        .auth-remember-me input[type="checkbox"] {
            appearance: none; -webkit-appearance: none;
            width: 18px; height: 18px; border: 2px solid var(--aqua-2);
            border-radius: 4px; background: #fff; cursor: pointer;
            transition: all 0.2s; position: relative; flex-shrink: 0;
        }
        .auth-remember-me input[type="checkbox"]:checked {
            background: var(--aqua-4); border-color: var(--aqua-4);
        }
        .auth-remember-me input[type="checkbox"]:checked::after {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            color: white; font-size: 0.6rem;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .auth-forgot-link {
            font-size: 0.82rem; color: var(--aqua-4);
            text-decoration: none; font-weight: 600; transition: color 0.2s;
        }
        .auth-forgot-link:hover { color: var(--text-dark); text-decoration: underline; }

        /* الأزرار */
        .auth-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            width: 100%; padding: 0.75rem; border-radius: var(--radius-sm);
            font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 0.95rem;
            border: none; cursor: pointer; transition: all 0.25s ease;
            position: relative; overflow: hidden;
        }
        .auth-btn-primary {
            background: linear-gradient(135deg, var(--aqua-4) 0%, var(--text-dark) 100%);
            color: var(--text-light); box-shadow: 0 4px 14px rgba(0, 150, 167, 0.3);
        }
        .auth-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 150, 167, 0.4); }
        .auth-btn-primary:active { transform: translateY(0); }
        .auth-btn-primary::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s;
        }
        .auth-btn-primary:hover::before { left: 100%; }

        .auth-btn .btn-spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        .auth-btn.loading .btn-spinner { display: block; }
        .auth-btn.loading .btn-text { opacity: 0.7; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* الفاصل */
        .auth-divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 1.5rem 0; color: #94a3b8; font-size: 0.82rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--aqua-2), transparent);
        }

        /* أزرار اجتماعية */
        .social-auth-buttons { display: flex; justify-content: center; gap: 0.75rem; }
        .social-auth-btn {
            width: 48px; height: 48px; border-radius: 50%;
            border: 1.5px solid #e2e8f0; background: #fff; color: #64748b;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; text-decoration: none;
        }
        .social-auth-btn:hover {
            transform: translateY(-3px); box-shadow: var(--shadow-md);
            border-color: var(--aqua-3); color: var(--aqua-4);
        }

        /* التذييل */
        .auth-card-footer {
            text-align: center; padding-top: 1.5rem; margin-top: 1.5rem;
            border-top: 1px solid var(--aqua-2); font-size: 0.88rem; color: #64748b;
        }
        .auth-card-footer a {
            color: var(--aqua-4); text-decoration: none; font-weight: 700; transition: color 0.2s;
        }
        .auth-card-footer a:hover { color: var(--text-dark); text-decoration: underline; }

        /* الشريط العلوي */
        .auth-topbar {
            position: fixed; top: 0; left: 0; right: 0; height: 50px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 150, 167, 0.1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; z-index: 1000;
        }
        .auth-topbar-brand {
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--text-dark); font-weight: 700; font-size: 1rem; text-decoration: none;
        }
        .auth-topbar-brand i { color: var(--aqua-4); font-size: 1.2rem; }
        .auth-topbar-time {
            font-size: 0.8rem; color: #64748b;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .auth-wrapper { padding-top: calc(50px + 2rem); }

        @media (max-width: 480px) {
            .auth-card { max-width: 100%; border-radius: var(--radius-lg); }
            .auth-card-header { padding: 2rem 1.5rem 1.5rem; }
            .auth-card-body { padding: 1.5rem; }
            .auth-card-header h2 { font-size: 1.3rem; }
            .auth-options-row { flex-direction: column; align-items: flex-start; }
            .auth-topbar-time { display: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important; transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="auth-page-bg">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <nav class="auth-topbar">
        <a href="#" class="auth-topbar-brand"><i class="fas fa-cube"></i>  أسم شركتك</a>
        <div class="auth-topbar-time"><i class="far fa-clock"></i> <span id="topbar-clock"></span></div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="auth-icon-wrap"><i class="fas fa-user-shield"></i></div>
               <h1>مرحباً بعودتك</h1>
                <p>سجّل دخولك للمتابعة إلى النظام</p>
            </div>
            <div class="auth-card-body">

                {% if form.errors %}
                <div class="auth-alert auth-alert-danger">
                    <i class="fas fa-exclamation-circle"></i>
                    <div>
                        <strong>خطأ في تسجيل الدخول</strong>
                        <div>اسم المستخدم أو كلمة المرور غير صحيحة. يرجى المحاولة مرة أخرى.</div>
                    </div>
                    <button class="alert-close" onclick="this.parentElement.style.display='none'"><i class="fas fa-times"></i></button>
                </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="auth-form-group">
                        <label class="auth-label" for="{{ form.username.id_for_label }}">
                            <i class="fas fa-user"></i> اسم المستخدم أو البريد الإلكتروني
                            <span class="required-star">*</span>
                        </label>
                        <div class="auth-input-wrap">
                            <input type="text" class="auth-input" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" placeholder="أدخل اسم المستخدم" required autocomplete="username">
                            <i class="fas fa-user auth-input-icon"></i>
                        </div>
                    </div>

                    <div class="auth-form-group">
                        <label class="auth-label" for="{{ form.password.id_for_label }}">
                            <i class="fas fa-lock"></i> كلمة المرور
                            <span class="required-star">*</span>
                        </label>
                        <div class="auth-input-wrap">
                            <input type="password" class="auth-input" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" placeholder="أدخل كلمة المرور" required autocomplete="current-password" style="padding-left: 2.8rem;">
                            <i class="fas fa-lock auth-input-icon"></i>
                            <button type="button" class="password-visibility-btn" data-target="{{ form.password.id_for_label }}" aria-label="إظهار كلمة المرور">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="auth-options-row">
                        <label class="auth-remember-me">
                            <input type="checkbox" name="remember" id="rememberMe">
                            <span>تذكرني</span>
                        </label>
                        <a href="{% url 'accounts:password_reset' %}" class="auth-forgot-link">نسيت كلمة المرور؟</a>
                    </div>

                    <button type="submit" class="auth-btn auth-btn-primary" id="login-submit-btn">
                        <span class="btn-spinner"></span>
                        <i class="fas fa-sign-in-alt btn-text"></i>
                        <span class="btn-text">تسجيل الدخول</span>
                    </button>
                </form>

                <div class="auth-divider">أو سجّل دخولك باستخدام</div>
                <div class="social-auth-buttons">
                    <a href="#" class="social-auth-btn" aria-label="جوجل"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-auth-btn" aria-label="مايكروسوفت"><i class="fab fa-microsoft"></i></a>
                    <a href="#" class="social-auth-btn" aria-label="أبل"><i class="fab fa-apple"></i></a>
                </div>

                <div class="auth-card-footer">
                    ليس لديك حساب؟ <a href="{% url 'accounts:register' %}">إنشاء حساب جديد</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إظهار/إخفاء كلمة المرور
        document.querySelectorAll('.password-visibility-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = document.getElementById(this.dataset.target);
                const icon = this.querySelector('i');
                if (!input) return;
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye');
                }
            });
        });

        // مؤشر تحميل عند الإرسال
        document.querySelector('form')?.addEventListener('submit', function() {
            const btn = document.getElementById('login-submit-btn');
            if (btn) { btn.classList.add('loading'); btn.disabled = true; }
        });

        // الساعة
        function updateClock() {
            const el = document.getElementById('topbar-clock');
            if (el) el.textContent = new Date().toLocaleDateString('ar-SA', { weekday: 'long', hour: '2-digit', minute: '2-digit', hour12: true });
        }
        updateClock(); setInterval(updateClock, 30000);
    </script>
</body>
</html>
