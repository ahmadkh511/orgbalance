<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تنبيه توفر منتج</title>
</head>
<body style="font-family: Tahoma, Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        
        <div style="background: #0097a7; color: white; padding: 20px; text-align: center;">
            <h2 style="margin: 0;">عاد التوفر! 🎉</h2>
        </div>
        
        <div style="padding: 30px; text-align: center;">
            <p style="font-size: 16px; color: #555;">مرحباً،</p>
            <p style="font-size: 16px; color: #333;">يسعدنا إخبارك بأن المنتج الذي طلبته قد عاد للمخزون:</p>
            
            <h3 style="color: #0097a7; margin: 20px 0;">{{ product.product_name }}</h3>
            
            <div style="margin: 20px 0;">
                <a href="{{ site_url }}/invoice/store/" 
                   style="background: #0097a7; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block;">
                    اذهب للمتجر الآن
                </a>
            </div>
            
            <p style="font-size: 12px; color: #999; margin-top: 30px;">تم إرسال هذا الإيميل تلقائياً من متجر الأصالة.</p>
        </div>
    </div>
</body>
</html>
